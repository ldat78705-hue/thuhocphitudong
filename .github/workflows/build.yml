name: Build GachNo APK

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Setup Gradle 8.5
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.5'

    - name: Build Debug APK
      run: gradle assembleDebug

    - name: Get version name
      id: version
      run: |
        if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
          echo "VERSION=${{ github.ref_name }}" >> $GITHUB_OUTPUT
        else
          echo "VERSION=dev-$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT
        fi

    - name: Rename APKs for clarity
      run: |
        mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/GachNo-${{ steps.version.outputs.VERSION }}-debug.apk || true

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: GachNo-${{ steps.version.outputs.VERSION }}-debug
        path: app/build/outputs/apk/debug/*.apk


    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        name: "GachNo ${{ github.ref_name }}"
        body: |
          ## GachNo ${{ github.ref_name }}

          Ứng dụng chuyển tiếp thông báo ngân hàng qua webhook để gạch nợ học phí tự động.

          ### Tính năng chính:
          - 🔔 Lắng nghe thông báo từ app ngân hàng
          - 🚀 Chuyển tiếp tự động qua Webhook (HTTP POST)
          - 📝 Cấu hình Params body template linh hoạt
          - 🔋 Tối ưu pin, chạy ngầm 24/24
          - 🧪 Test gửi thử với nội dung tùy chỉnh
          - 🌐 Hỗ trợ Tiếng Việt / English

          ### Cài đặt:
          1. Tải file `GachNo-${{ github.ref_name }}-debug.apk`
          2. Cài đặt trên điện thoại Android
          3. Cấp quyền Notification Access
          4. Nhập Webhook URL và bấm Bật chuyển tiếp
        files: |
          app/build/outputs/apk/debug/GachNo-*.apk
        generate_release_notes: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
